<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ディーラー評価フォーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f5f5f0;color:#1a1a1a;padding-bottom:3rem}
.header{background:#1a1a1a;color:#fff;padding:1rem;text-align:center;position:sticky;top:0;z-index:10}
.header h1{font-size:15px;font-weight:500}
.header .sub{font-size:11px;opacity:.6;margin-top:2px}
.steps{display:flex;justify-content:center;gap:6px;margin-top:8px}
.step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3)}
.step-dot.active{background:#fff;width:20px;border-radius:4px}
.step-dot.done{background:rgba(255,255,255,.7)}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border-radius:12px;padding:1rem;margin:1rem 0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.row{padding:10px 0;border-bottom:1px solid #f0f0f0}
.row:last-child{border-bottom:none}
.row-top{display:flex;align-items:center;justify-content:space-between}
.row-name{font-size:13px;color:#1a1a1a;flex:1;margin-right:8px}
.stars{display:flex;gap:4px;flex-shrink:0}
.star{font-size:22px;cursor:pointer;color:#ddd;line-height:1;user-select:none;-webkit-tap-highlight-color:transparent;padding:2px}
.star.on{color:#f59e0b}
.guide{font-size:11px;color:#999;margin-top:6px;line-height:1.6;background:#f9f9f9;border-radius:6px;padding:6px 8px}
.guide-item{display:block;margin-bottom:1px}
.guide-item.current{color:#2563eb;font-weight:500}
.comment-area{width:100%;margin-top:8px;padding:8px 10px;border-radius:8px;border:1px solid #e5e5e5;background:#f9f9f9;color:#1a1a1a;font-size:13px;resize:none;font-family:inherit}
.select-field{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #e5e5e5;background:#f9f9f9;color:#1a1a1a;font-size:14px;-webkit-appearance:none}
.search-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #e5e5e5;background:#f9f9f9;color:#1a1a1a;font-size:14px;font-family:inherit;margin-bottom:8px}
.pref-select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #e5e5e5;background:#f9f9f9;color:#1a1a1a;font-size:13px;-webkit-appearance:none;margin-bottom:8px}
.radio-list{max-height:220px;min-height:48px;overflow-y:auto;border:1px solid #e5e5e5;border-radius:8px;background:#fff}
.radio-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.radio-item:last-child{border-bottom:none}
.radio-item:active{background:#f5f5f0}
.radio-circle{width:22px;height:22px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.radio-circle.checked{border-color:#3b82f6;background:#3b82f6}
.radio-dot{width:8px;height:8px;border-radius:50%;background:#fff;display:none}
.radio-circle.checked .radio-dot{display:block}
.radio-label{font-size:14px;color:#1a1a1a;flex:1}
.radio-sub{font-size:11px;color:#999;margin-left:6px}
.radio-empty{padding:12px 14px;font-size:13px;color:#999}
.selected-tag{display:none;align-items:center;justify-content:space-between;margin-top:8px;padding:9px 12px;background:#eff6ff;border-radius:8px;font-size:13px;color:#1d4ed8}
.selected-tag.show{display:flex}
.selected-tag .clear{cursor:pointer;font-size:18px;color:#3b82f6;line-height:1}
.deduct-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.deduct-row:last-child{border-bottom:none}
.deduct-label{font-size:13px;color:#1a1a1a;flex:1}
.counter{display:flex;align-items:center;gap:8px}
.cnt-btn{width:32px;height:32px;border-radius:8px;border:1px solid #e5e5e5;background:#f9f9f9;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.cnt-btn.minus{color:#ef4444}
.cnt-btn.plus{color:#22c55e}
.cnt-val{min-width:20px;text-align:center;font-size:14px;font-weight:500}
.nav{display:flex;gap:8px;padding:0 1rem;margin-top:1rem}
.btn{flex:1;padding:12px;border-radius:8px;border:1px solid #e5e5e5;background:#fff;color:#1a1a1a;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn:active{opacity:.8}
.hint{font-size:11px;color:#999;margin:0 0 4px;padding:0 1rem}
.toast{display:none;margin:1rem;padding:12px 16px;background:#dcfce7;border:1px solid #86efac;color:#166534;border-radius:8px;font-size:13px;text-align:center}
.loading{display:none;margin:1rem;padding:12px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;border-radius:8px;font-size:13px;text-align:center}
.error-msg{display:none;margin:1rem;padding:12px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:8px;font-size:13px}
.pin-btn{padding:18px;font-size:20px;font-weight:500;border-radius:10px;border:1px solid #e5e5e5;background:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;width:100%}
.pin-btn:active{background:#f5f5f0}
.pin-del{background:#f9f9f9}
.pin-ok{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
</style>
</head>
<body>
<div class="header">
  <h1>ディーラー評価フォーム</h1>
  <div class="sub" id="screenSub">PIN認証</div>
  <div class="steps">
    <div class="step-dot active" id="dot0"></div>
    <div class="step-dot" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
  </div>
</div>
<div style="max-width:480px;margin:0 auto;padding:0 1rem">
<div class="screen active" id="screen-pin">
  <div style="min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem">
    <div style="font-size:40px;margin-bottom:1rem">🔐</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:6px">ディーラー評価フォーム</div>
    <div style="font-size:13px;color:#999;margin-bottom:1.5rem">PINを入力してください</div>
    <div style="width:100%;max-width:280px">
      <div style="width:100%;padding:14px;font-size:28px;text-align:center;border-radius:12px;border:2px solid #e5e5e5;background:#f9f9f9;margin-bottom:12px;min-height:60px;display:flex;align-items:center;justify-content:center">
        <span id="pinDots">––––</span>
      </div>
      <div id="pinError" style="display:none;margin-bottom:10px;padding:8px 12px;background:#fef2f2;border-radius:8px;font-size:13px;color:#dc2626;text-align:center">PINが正しくありません</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn pin-del" onclick="pinDelete()">⌫</button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn pin-ok" onclick="pinSubmit()">✓</button>
      </div>
    </div>
  </div>
</div>
<div class="screen" id="screen0">
  <div class="card">
    <div class="card-title">👤 評価者</div>
    <div class="selected-tag show" id="evalSelectedTag">
      <span id="evalSelectedLabel"></span>
    </div>
    <select class="select-field" id="evalRole" style="margin-top:10px">
      <option value="">ロールを選択</option>
      <option value="td">TD</option>
      <option value="floor">フロア</option>
      <option value="pit">ピット</option>
      <option value="admin">運営</option>
    </select>
  </div>
  <div class="card">
    <div class="card-title">🃏 評価するスタッフ</div>
    <input class="search-input" id="dealerSearch" placeholder="名前で検索（ひらがなOK）..." oninput="filterDealer()">
    <select class="pref-select" id="prefFilter" onchange="filterDealer()">
      <option value="">都道府県で絞り込み</option>
    </select>
    <div class="radio-list" id="dealerRadioList"></div>
    <div class="selected-tag" id="dealerSelectedTag">
      <span id="dealerSelectedLabel"></span>
      <span class="clear" onclick="clearDealer()">×</span>
    </div>
  </div>
  <div class="nav">
    <button class="btn primary" onclick="goTo(1)">次へ →</button>
  </div>
</div>
<div class="screen" id="screen1">
  <p class="hint">気になった項目だけ選択してOK。未選択のまま送信できます。</p>
  <div class="card">
    <div class="card-title">🃏 カードの扱い</div>
    <div id="rows-card"></div>
    <textarea class="comment-area" data-comment="card" rows="2" placeholder="カードに関するコメント（任意）"></textarea>
  </div>
  <div class="card">
    <div class="card-title">🪙 チップの扱い</div>
    <div id="rows-chip"></div>
    <textarea class="comment-area" data-comment="chip" rows="2" placeholder="チップに関するコメント（任意）"></textarea>
  </div>
  <div class="card">
    <div class="card-title">🧮 計算力・ゲーム進行</div>
    <div id="rows-game"></div>
    <textarea class="comment-area" data-comment="game" rows="2" placeholder="ゲーム進行に関するコメント（任意）"></textarea>
  </div>
  <div class="nav">
    <button class="btn" onclick="goTo(0)">← 戻る</button>
    <button class="btn primary" onclick="goTo(2)">次へ →</button>
  </div>
</div>
<div class="screen" id="screen2">
  <p class="hint">気になった項目だけ選択してOK。未選択のまま送信できます。</p>
  <div class="card">
    <div class="card-title">💛 人柄</div>
    <div id="rows-personality"></div>
    <textarea class="comment-area" data-comment="personality" rows="2" placeholder="人柄に関するコメント（任意）"></textarea>
  </div>
  <div class="card" style="border-left:3px solid #ef4444">
    <div class="card-title" style="color:#ef4444">⚠️ 減点記録</div>
    <div class="deduct-row">
      <div class="deduct-label">私物・弁当を片付けなかった</div>
      <div class="counter">
        <button class="cnt-btn minus" onclick="changeDeduct('mess',-1)">－</button>
        <span class="cnt-val" id="mess-count">0</span>
        <button class="cnt-btn plus" onclick="changeDeduct('mess',1)">＋</button>
      </div>
    </div>
    <div class="deduct-row">
      <div class="deduct-label">控室での悪口・不適切発言</div>
      <div class="counter">
        <button class="cnt-btn minus" onclick="changeDeduct('gossip',-1)">－</button>
        <span class="cnt-val" id="gossip-count">0</span>
        <button class="cnt-btn plus" onclick="changeDeduct('gossip',1)">＋</button>
      </div>
    </div>
    <div class="deduct-row">
      <div class="deduct-label">その他問題行動</div>
      <div class="counter">
        <button class="cnt-btn minus" onclick="changeDeduct('other',-1)">－</button>
        <span class="cnt-val" id="other-count">0</span>
        <button class="cnt-btn plus" onclick="changeDeduct('other',1)">＋</button>
      </div>
    </div>
    <textarea class="comment-area" data-comment="deduct" rows="2" placeholder="問題行動の詳細（任意）"></textarea>
  </div>
  <div class="card">
    <div class="card-title">💬 総合コメント</div>
    <textarea class="comment-area" data-comment="overall" rows="3" placeholder="全体的な気づき・成長のポイントなど"></textarea>
  </div>
  <div class="nav">
    <button class="btn" onclick="goTo(1)">← 戻る</button>
    <button class="btn primary" onclick="submitForm()">送信 ✓</button>
  </div>
  <div class="loading" id="loading">送信中...</div>
  <div class="toast" id="toast">✅ 評価を登録しました</div>
  <div class="error-msg" id="error-msg">送信に失敗しました。もう一度お試しください。</div>
</div>
</div>

const AXES={card:[{key:'shuffle',label:'シャッフルの正確さ',guide:['毎回ミスがある','時々ミスや雑さが目立つ','平均的にこなせる','安定して正確・スムーズ','完璧・お手本レベル']},{key:'pitching',label:'ピッチングの正確さ',guide:['毎回コントロールが乱れる','時々ずれや強さにムラがある','平均的に届けられる','安定して正確に届けられる','狙い通り・お手本レベル']},{key:'cardspeed',label:'スピード',guide:['著しく遅く進行を妨げる','やや遅くテンポが乱れる','平均的な速さ','テンポよくスムーズ','非常に速く正確']},{key:'decktilt',label:'デックの傾き',guide:['常に傾いており見えてしまう','時々傾きが目立つ','多少傾くが支障なし','ほぼ水平を保てる','常に完璧な角度を維持']}],chip:[{key:'sizing',label:'チップサイジング',guide:['サイジングできていない','時々サイジングしていない','平均的にサイジングできる','安定してきれいにサイジング','常に完璧・見栄えも美しい']},{key:'count',label:'チップカウント',guide:['毎回数え間違いがある','時々ミスがある','平均的に正確','ほぼミスなく素早い','完璧・即座に正確']}],game:[{key:'calc',label:'計算力',guide:['毎回計算ミスがある','時々計算が遅い・間違える','平均的に計算できる','素早く正確に計算できる','瞬時に正確・どんな状況も対応']},{key:'rules',label:'ルール理解度',guide:['基本ルールが不安定','時々ルールに迷う','基本ルールは問題なし','応用ルールも対応できる','全ゲーム・全状況に完全対応']},{key:'mistake',label:'ミスの少なさ',guide:['毎回何らかのミスがある','時々ミスが目立つ','平均的なミス頻度','ほぼミスなく進行できる','ミスがほぼゼロ・自己修正も迅速']},{key:'tempo',label:'テンポコントロール',guide:['進行が遅くゲームが止まる','時々テンポが乱れる','平均的なテンポ','スムーズなテンポを維持','最高のテンポ・場を支配できる']},{key:'report',label:'フロアへの状況報告',guide:['報告できない・状況把握不可','報告が遅い・情報が不正確','最低限の報告はできる','素早く正確に報告できる','的確・簡潔・即座に状況共有']}],personality:[{key:'greeting',label:'挨拶・礼儀',guide:['挨拶がない・態度が悪い','挨拶が不十分・受け身','普通に挨拶できる','自発的に明るく挨拶できる','誰に対しても常に完璧な礼儀']},{key:'service',label:'お客様との接客',guide:['お客様対応に問題がある','接客がやや消極的','普通に対応できる','自然な会話・お客様が喜ぶ','場を盛り上げ指名・リピートされる']},{key:'obedience',label:'指示への素直さ',guide:['指示を無視・反発する','時々素直に従えない','指示通りに動ける','素直に即動ける・確認も丁寧','先読みして動ける・指示不要なレベル']},{key:'teamwork',label:'チームへの協力度',guide:['協力しない・自分本位','言われたことだけやる','普通に協力できる','積極的に周りをサポート','率先してチームを引っ張る']}]};
const ratings={};const deducts={mess:0,gossip:0,other:0};const selected={eval:null,dealer:null};
const toKana=s=>s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));
const norm=s=>toKana((s||'').toLowerCase());
let pinValue='';
function pinPress(n){if(pinValue.length>=4)return;pinValue+=n;updatePinDisplay();if(pinValue.length===4)setTimeout(pinSubmit,300);}
function pinDelete(){pinValue=pinValue.slice(0,-1);updatePinDisplay();}
function updatePinDisplay(){document.getElementById('pinDots').textContent=pinValue.split('').map(()=>'●').join('')+'––––'.slice(pinValue.length);}
function pinSubmit(){
  const ev=PIN_MAP[pinValue];
  document.getElementById('pinError').style.display='none';
  if(!ev){document.getElementById('pinError').style.display='block';pinValue='';updatePinDisplay();return;}
  selected.eval=ev;
  const roleMap={'TD':'td','フロア':'floor','ピット':'pit','運営':'admin'};
  setTimeout(()=>{
    showScreen('screen0');
    document.getElementById('evalSelectedLabel').textContent='✓ '+ev.name+'（'+ev.role+'）';
    document.getElementById('evalRole').value=roleMap[ev.role]||'';
  },300);
}
function initPrefSelect(){const s=document.getElementById('prefFilter');[...new Set(DEALERS.map(d=>d.pref))].sort().forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;s.appendChild(o);});}
function renderRadioList(list){
  const el=document.getElementById('dealerRadioList');
  if(!list.length){el.innerHTML='<div class="radio-empty">見つかりません</div>';return;}
  el.innerHTML='';
  list.forEach(x=>{
    const isChecked=selected.dealer&&selected.dealer.id===x.id;
    const div=document.createElement('div');div.className='radio-item';
    div.innerHTML='<div class="radio-circle '+(isChecked?'checked':'')+'" id="rc-'+x.id+'"><div class="radio-dot"></div></div><div class="radio-label">'+x.name+'<span class="radio-sub">'+x.pref+'</span></div>';
    div.onclick=()=>selectDealer(x);
    el.appendChild(div);
  });
}
function selectDealer(x){
  selected.dealer=x;
  document.querySelectorAll('[id^="rc-"]').forEach(el=>el.classList.remove('checked'));
  const t=document.getElementById('rc-'+x.id);if(t)t.classList.add('checked');
  document.getElementById('dealerSelectedLabel').textContent='✓ '+x.name+'（'+x.pref+'）';
  document.getElementById('dealerSelectedTag').classList.add('show');
}
function clearDealer(){selected.dealer=null;document.getElementById('dealerSelectedTag').classList.remove('show');document.getElementById('dealerSearch').value='';document.getElementById('prefFilter').value='';filterDealer();}
function filterDealer(){
  const q=norm(document.getElementById('dealerSearch').value);
  const pref=document.getElementById('prefFilter').value;
  const filtered=DEALERS.filter(x=>(!q||norm(x.name).includes(q)||norm(x.kana).includes(q))&&(!pref||x.pref===pref));
  renderRadioList(filtered);
}
function buildRows(containerId,axisKey){
  const el=document.getElementById(containerId);el.innerHTML='';
  AXES[axisKey].forEach(({key,label,guide})=>{
    if(ratings[key]===undefined)ratings[key]=0;
    const div=document.createElement('div');div.className='row';
    const gh=guide.map((g,i)=>'<span class="guide-item" id="g-'+key+'-'+(i+1)+'">★'+(i+1)+'：'+g+'</span>').join('');
    div.innerHTML='<div class="row-top"><div class="row-name">'+label+'</div><div class="stars" id="stars-'+key+'"></div></div><div class="guide">'+gh+'</div>';
    el.appendChild(div);buildStarEl(key);
  });
}
function buildStarEl(key){
  const el=document.getElementById('stars-'+key);if(!el)return;el.innerHTML='';
  for(let i=1;i<=5;i++){const s=document.createElement('span');s.className='star'+(ratings[key]>=i?' on':'');s.textContent='★';const v=i;s.onclick=()=>{ratings[key]=(ratings[key]===v)?0:v;buildStarEl(key);updateGuide(key);};el.appendChild(s);}
  updateGuide(key);
}
function updateGuide(key){const v=ratings[key];for(let i=1;i<=5;i++){const g=document.getElementById('g-'+key+'-'+i);if(g)g.className='guide-item'+(v===i?' current':'');}}
function rebuildAll(){buildRows('rows-card','card');buildRows('rows-chip','chip');buildRows('rows-game','game');buildRows('rows-personality','personality');}
function changeDeduct(key,delta){deducts[key]=Math.max(0,deducts[key]+delta);document.getElementById(key+'-count').textContent=deducts[key];}
const SUBS=['ステップ 1 / 3','ステップ 2 / 3','ステップ 3 / 3'];
function goTo(n){
  if(n===1){if(!selected.eval){alert('評価者を選択してください');return;}if(!document.getElementById('evalRole').value){alert('ロールを選択してください');return;}if(!selected.dealer){alert('ディーラーを選択してください');return;}}
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');if(s.id==='screen'+n)s.classList.add('active');});
  for(let i=0;i<3;i++){const d=document.getElementById('dot'+i);d.classList.remove('active','done');if(i===n)d.classList.add('active');else if(i<n)d.classList.add('done');}
  document.getElementById('screenSub').textContent=SUBS[n];window.scrollTo(0,0);
}
async function submitForm(){
  const now=new Date();
  const ds=now.getFullYear()+'/'+(now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0')+' '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const comments={};document.querySelectorAll('textarea[data-comment]').forEach(t=>{comments[t.dataset.comment]=t.value.trim();});
  const scoreData={};[...AXES.card,...AXES.chip,...AXES.game,...AXES.personality].forEach(({key})=>scoreData[key]=ratings[key]||0);
  const payload={datetime:ds,evaluator_id:selected.eval.id,evaluator_name:selected.eval.name,evaluator_role:document.getElementById('evalRole').value,dealer_id:selected.dealer.id,dealer_name:selected.dealer.name,dealer_pref:selected.dealer.pref,...scoreData,comment_card:comments.card||'',comment_chip:comments.chip||'',comment_game:comments.game||'',comment_personality:comments.personality||'',comment_deduct:comments.deduct||'',comment_overall:comments.overall||'',deduct_mess:deducts.mess,deduct_gossip:deducts.gossip,deduct_other:deducts.other};
  document.getElementById('loading').style.display='block';document.getElementById('error-msg').style.display='none';
  try{
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    document.getElementById('loading').style.display='none';document.getElementById('toast').style.display='block';
    setTimeout(()=>{document.getElementById('toast').style.display='none';resetForm();},2500);
  }catch(e){document.getElementById('loading').style.display='none';document.getElementById('error-msg').style.display='block';}
}
function resetForm(){
  Object.keys(ratings).forEach(k=>ratings[k]=0);Object.keys(deducts).forEach(k=>deducts[k]=0);
  ['mess','gossip','other'].forEach(k=>document.getElementById(k+'-count').textContent='0');
  document.querySelectorAll('textarea').forEach(t=>t.value='');
  selected.dealer=null;selected.eval=null;
  document.getElementById('dealerSelectedTag').classList.remove('show');
  pinValue='';updatePinDisplay();
  document.getElementById('pinError').style.display='none';
  showScreen('screen-pin');
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));}
// スプレッドシートからディーラーリストを読み込む
async function loadDealers(){
  try {
    const res = await fetch(GAS_URL + '?type=dealers');
    const json = await res.json();
    if(json.status === 'ok' && json.dealers.length > 0){
      // スプレッドシートのデータで上書き
      DEALERS.length = 0;
      json.dealers.forEach(d => DEALERS.push(d));
    }
  } catch(e){
    console.log('ディーラーリスト読み込み失敗、ローカルデータを使用');
  } finally {
    initPrefSelect();
    filterDealer();
  }
}

loadDealers();
rebuildAll();
</script>
